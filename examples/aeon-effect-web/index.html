<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aeon-effect: live GitHub user search</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      body {
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        opacity: 0.7;
        margin-top: 0;
        font-size: 0.9rem;
      }
      input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #888;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .status {
        margin: 0.75rem 0 0.25rem;
        font-size: 0.85rem;
        opacity: 0.75;
        min-height: 1.2em;
      }
      ul.results {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0;
      }
      ul.results li {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        border-bottom: 1px solid rgba(128, 128, 128, 0.2);
      }
      ul.results img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
      }
      ul.results a {
        color: inherit;
        text-decoration: none;
      }
      ul.results a:hover {
        text-decoration: underline;
      }
      .log {
        margin-top: 1.5rem;
        padding: 0.75rem;
        background: rgba(128, 128, 128, 0.1);
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
        max-height: 200px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>Live GitHub user search</h1>
    <p class="subtitle">
      aeon owns the input stream (debounce, dedupe, switchLatest). Effect owns the fetch
      (typed errors, timeout, interruption). <code>fromStream</code> glues them.
    </p>
    <input id="q" type="search" placeholder="type a GitHub username..." autocomplete="off" />
    <div id="status" class="status"></div>
    <ul id="results" class="results"></ul>
    <div id="log" class="log"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
